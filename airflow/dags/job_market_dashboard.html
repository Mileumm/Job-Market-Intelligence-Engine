, high-performance platform built on Databricks that will serve as the substrate for all Kinaxis applications. We aren\u2019t looking for an integrator to build pipelines; we need a Systems Architect to build the engine. Why This Role is Different: Most \"Data Architect\" roles focus on 1st-party consumers (internal analytics and dashboards). This role is about platform engineering. You will solve low-level architectural challenges that most data engineers never encounter: True Multi-Tenancy: Designing resource isolation, security boundaries, and noisy-neighbor protections at the infrastructure level. Platform-as-a-Product: Building the developer frameworks and APIs that allow other teams to build atop our Data Fabric. High-Scale Systems Engineering: Navigating the complexities of distributed compute and memory management. You understand how to optimize for data locality, shuffle performance, and high-throughput I/O to ensure our customers\u2019 largest datasets move with zero friction across a global fo otprint Vacancy Status This is an existing job vacancy What you will do Architect the Fabric: Lead the technical vision for a Databricks-centric platform, focusing on Delta Sharing, Unity Catalog, and custom data orchestration. Solve for \"The Platform\": Move beyond simple ingestion. You will design the \"low-level\" primitives\u2014identity, compute quotas, and automated RBAC\u2014that make the platform scalable for thousands of external users. Bridge the Gap: Translate complex infrastructure constraints (Kubernetes, Azure/GCP, Databricks) into a seamless developer experience for our internal and external application teams. Direct Impact: Your contributions will have direct impact on the Kinaxis platform. What we are looking for Systems Thinker: You have 10+ years of experience, but you don't just \"use\" tools; you understand how they work under the hood. You know the difference between a solution and a scalable platform. Databricks Power User: You have deep hand yer awards globally, we are proud to work with our customers and employees towards solving some of the biggest challenges facing supply chains today. Kinaxis is a global leader in modern supply chain orchestration, powering complex global supply chains, and supporting the people who manage them. Our powerful, AI infused platform provides full transparency and visibility across end-to-end supply chains, enabling our customers to make faster, better decisions. We are trusted by renowned global brands to provide the agility and predictability needed to navigate today\u2019s volatility and disruption. With more than 40,000 users in over 100 countries, we are expanding our team as we continue to innovate and revolutionize how we support our customers. Location Hybrid - Ottawa and Toronto. Remote for other locations in Canada About The Team The Enterprise Architecture team at Kinaxis shapes the long \u2011 term technical direction of our enterprise platforms, ensuring our technology ecosystem remains scalable, secure, and aligned with our strategic goals. We work across Corporate IT and business teams to set architectural guardrails, provide solution guidance, and steward the health of critical platforms such as Salesforce, ServiceNow, NetSuite, and others. We are expanding Enterprise Architecture to ensure Kinaxis can adopt AI and emerging automation patterns at enterprise scale; quickly, safely, and consistently by embedding clear architectural guardrails into how systems, data, and decisions evolve. About The Role We are looking for an AI Enterprise Architect to help shape how AI \u2011 enabled and agent \u2011 driven capabilities are designed, governed, and evolved across Corporate Kinaxis. This is a senior architecture role focused on defining enterprise \u2011 level AI architecture, establishing clear guardrails, and working closely with other architects and risk partners to ensure AI accelerates the business without creating unmanaged risk or long \u2011 term archi volve the guardrails as AI changes: maintain an enterprise AI \u201ctechnology and pattern radar\u201d focused on architectural implications (not hype), and update approved patterns and constraints on a cadence that matches real AI change while preserving stable principles so teams aren\u2019t constantly re-architecting. Support adoption with hands-on architectural guidance: engage early with teams to shape designs, anticipate integration/data boundary issues, and reduce rework; providing direct guidance grounded in real-world implementation and operational considerations. What we are looking for Required 8\u201310+ years of experience in enterprise architecture, solution architecture, or senior technical roles within complex enterprise environments. Strong grounding in enterprise architecture practices, including reference architectures, integration patterns, and architectural governance. Sufficient AI architecture literacy to evaluate designs involving AI \u2011 enabled or agent \u2011 based systems, including implications for decision \u2011 making, data access, cost, and operability. Experience working in a federated architecture model, partnering with other architects and risk stakeholders. Ability to communicate complex architectural trade \u2011 offs clearly to both technical and non \u2011 technical audiences. Nice to have Experience contributing to or defining AI \u2011 related architectural standards or guardrails. Familiarity with enterprise data and integration architectures that support AI workloads. Exposure to environments where technology is evolving rapidly and ambiguity is the norm. Work With Impact: Our platform directly helps companies power the world\u2019s supply chains. We see the results of what we do out in the world every day, when we see store shelves stocked, when medications are available for our loved ones, and so much more. Work with Fortune 500 Brands: Companies across industries trust us to help them take control of their integrated
