services:
  db:
    image: postgres:15
    container_name: job_market_db
    env_file: .env
    environment:
      POSTGRES_USER: ${USER_DB}
      POSTGRES_PASSWORD: ${PW_DB}
      POSTGRES_DB: ${TABLE_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    
  worker:
      build: ./data_script
      env_file: .env
      environment:
        - DATABASE_URL=postgresql://${USER_DB}:${PW_DB}@db:5432/${TABLE_DB}
      depends_on:
        - db
      volumes:
        - ./data_script:/app
    